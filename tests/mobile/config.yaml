# Maestro E2E Test Configuration for PetForce Mobile
# https://maestro.mobile.dev/

# Flow execution settings
flows:
  - flows/

# App configuration
appId: com.petforce.app

# Environment variables available to all flows
env:
  APP_ID: com.petforce.app
  TEST_USER_EMAIL: ${TEST_USER_EMAIL}
  TEST_USER_PASSWORD: ${TEST_USER_PASSWORD}
  API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}

# Tags for selective test execution
tags:
  smoke: "Quick health check — app launches and home screen renders"
  auth: "Authentication flows — sign-in, sign-up, onboarding"
  pets: "Pet CRUD — add, edit, delete pets"
  activities: "Activity logging — walks, feedings, vet visits"
  feeding: "Feeding schedules — create, snooze, complete"
  health: "Health records — vaccinations, medications"
  navigation: "Navigation — tab switching, deep linking"
  theming: "Household theming — color application"
  notifications: "Push notifications — token registration"
