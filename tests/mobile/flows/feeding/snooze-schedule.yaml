# Feeding: Snooze a feeding reminder
# Tags: feeding
# Prerequisite: Existing feeding schedule with active reminder
appId: com.petforce.app

---

- launchApp

# Navigate to feeding schedules
- tapOn: "Feeding"

# Find the active reminder
- assertVisible: "Breakfast"
- assertVisible: "Due now"

# Snooze it
- tapOn: "Snooze"

# Select snooze duration
- tapOn: "15 minutes"

# Verify snoozed state
- assertVisible: "Snoozed"
- takeScreenshot: feeding-schedule-snoozed
