name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly E2E safety net — runs at 3 AM UTC every day
    - cron: "0 3 * * *"
  workflow_dispatch:
  workflow_call:

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build

  unit-tests:
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@petforce/core test
      - run: cd tests && npx vitest run --passWithNoTests

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      - name: Audit production dependencies (high/critical)
        run: |
          pnpm audit --prod --audit-level=high || echo "::warning::High/critical vulnerabilities found in transitive deps — see audit output above. Dependabot will open PRs when fixes are available."

      - name: Audit all dependencies (moderate)
        run: |
          pnpm audit --audit-level=moderate || echo "::warning::Moderate vulnerabilities found — see audit output above."

  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: lint-and-build
    # Local Postgres service container — replaces Supabase-hosted DB for CI.
    # See docs/dev/ci-local-postgres.md for switchback instructions.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: petforce_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5
    # Run E2E when:
    #   1. Nightly scheduled run (safety net for main)
    #   2. PR has the 'run-e2e' label (manual override)
    #   3. PR touches code paths that affect E2E behavior
    #   4. Push to main (post-merge validation)
    #   5. Manual workflow dispatch
    # Skip for docs-only, mobile-only, and infra-only PRs unless labeled
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && (
        contains(github.event.pull_request.labels.*.name, 'run-e2e') ||
        contains(github.event.pull_request.labels.*.name, 'backend') ||
        contains(github.event.pull_request.labels.*.name, 'frontend') ||
        contains(github.event.pull_request.labels.*.name, 'core')
      ))
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/petforce_test
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      CLERK_JWT_KEY: ${{ secrets.CLERK_JWT_KEY }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_API_URL: http://127.0.0.1:3001
      NEXT_PUBLIC_WEB_URL: http://localhost:3000
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      CLERK_TEST_CODE: "424242"
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile

      # Build with NEXT_PUBLIC_* vars available (set via job-level env)
      - name: Build all packages
        run: pnpm build

      - name: Install Playwright browsers
        run: cd tests && npx playwright install --with-deps chromium

      - name: Run database migrations
        run: pnpm --filter=@petforce/db db:migrate

      - name: Start API server
        run: |
          cd apps/api
          node dist/index.js > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid
          # Wait for API to be ready (up to 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
              echo "API ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -f http://localhost:3001/health || { echo "API failed to start:"; cat /tmp/api.log; exit 1; }
          # Verify API is reachable on 127.0.0.1 (what browsers resolve localhost to)
          curl -f http://127.0.0.1:3001/health || { echo "API not reachable on 127.0.0.1"; cat /tmp/api.log; exit 1; }

      - name: Start web server
        run: |
          cd apps/web
          npx next start > /tmp/web.log 2>&1 &
          echo $! > /tmp/web.pid
          # Wait for web to be ready (up to 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Web ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -f http://localhost:3000 || { echo "Web failed to start:"; cat /tmp/web.log; exit 1; }

      - name: Verify CSP header includes API URL
        run: |
          CSP=$(curl -sI http://localhost:3000 | grep -i content-security-policy || echo "NO CSP HEADER")
          echo "CSP: $CSP"
          echo "Looking for connect-src with API URL..."
          echo "$CSP" | grep -o "connect-src[^;]*" || echo "connect-src not found"

      - name: Run E2E tests
        shell: bash
        run: |
          set -o pipefail
          cd tests && npx playwright test --config=playwright.config.ts 2>&1 | tee /tmp/e2e-output.log

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-test-results
          path: tests/test-results/
          retention-days: 7

      - name: Upload server logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: server-logs
          path: |
            /tmp/api.log
            /tmp/web.log
            /tmp/e2e-output.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 7
