name: Deploy

on:
  push:
    branches: [main]

# Prevent concurrent deploys to the same environment
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # Gate: only deploy if CI passes
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  deploy-api:
    runs-on: ubuntu-latest
    needs: ci
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Build core package
        run: pnpm build --filter=@petforce/core

      # Run database migrations before deploying new code
      - name: Run database migrations
        run: pnpm --filter=@petforce/db db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # Deploy API to Railway
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service petforce-api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      # Verify deployment health
      - name: Health check
        run: |
          sleep 15
          for i in 1 2 3 4 5; do
            if curl -sf "${{ vars.API_PRODUCTION_URL }}/health"; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1

  deploy-web:
    runs-on: ubuntu-latest
    needs: ci
    environment: production
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      # Deploy web to Vercel via CLI (deploy from repo root for monorepo support)
      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Configure Vercel project
        run: |
          # Ensure root directory is set for monorepo
          curl -sf -X PATCH "https://api.vercel.com/v9/projects/$VERCEL_PROJECT_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"rootDirectory":"apps/web"}'
          # Link project at repo root
          mkdir -p .vercel
          echo "{\"orgId\":\"$VERCEL_ORG_ID\",\"projectId\":\"$VERCEL_PROJECT_ID\"}" > .vercel/project.json
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
