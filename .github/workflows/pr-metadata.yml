name: PR Metadata

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  auto-label:
    name: Auto-label by changed files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
          sync-labels: false

  auto-assign:
    name: Auto-assign author
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;

            // Assign PR author
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              assignees: [author],
            });

            // Extract workspace name from branch
            // Conductor branches: <prefix>/<name> e.g. betforce1211-gif/pr-template-check
            const branch = pr.head.ref;
            const parts = branch.split('/');

            if (parts.length >= 2) {
              const workspaceName = parts.slice(1).join('/');
              const labelName = `workspace-${workspaceName}`;

              // Ensure label exists, then apply it
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: labelName,
                });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    name: labelName,
                    color: '1D76DB',
                    description: `PR from ${workspaceName} workspace`,
                  });
                } else {
                  core.warning(`Failed to check label: ${e.message}`);
                }
              }

              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  labels: [labelName],
                });
              } catch (e) {
                core.warning(`Failed to add workspace label: ${e.message}`);
              }
            }

  check-template:
    name: PR template check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const errors = [];

            const sections = [
              { name: 'Summary', pattern: /## Summary\s*\n(?!## )(.+)/s },
              { name: 'Type of change', pattern: /## Type of change[\s\S]*?\[x\]/i },
              { name: 'Closes', pattern: /## Closes\s*\n(?!## )(.+)/s },
              { name: 'Breaking changes', pattern: /## Breaking changes\s*\n(?!## )(.+)/s },
              { name: 'Documentation', pattern: /## Documentation\s*\n(?!## )(.+)/s },
              { name: 'Test plan', pattern: /## Test plan\s*\n(?!## )(.+)/s },
              { name: 'Size check', pattern: /## Size check\s*\n(?!## )(.+)/s },
            ];

            for (const section of sections) {
              if (!section.pattern.test(body)) {
                errors.push(`- **${section.name}**: missing or empty`);
              }
            }

            if (errors.length > 0) {
              const message = [
                '## PR Template Check Failed',
                '',
                'The following sections are missing or incomplete:',
                '',
                ...errors,
                '',
                'Please fill out all sections of the [PR template](.github/pull_request_template.md).',
              ].join('\n');

              core.setFailed(message);

              // Post or update a comment
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
              });
              const botComment = comments.find(c =>
                c.user.type === 'Bot' && c.body.includes('PR Template Check')
              );

              const commentBody = message;

              if (botComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: commentBody,
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  body: commentBody,
                });
              }
            } else {
              console.log('All PR template sections are filled out.');

              // Clean up old failure comment if it exists
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
              });
              const botComment = comments.find(c =>
                c.user.type === 'Bot' && c.body.includes('PR Template Check')
              );
              if (botComment) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                });
              }
            }

  check-metadata:
    name: PR metadata check
    runs-on: ubuntu-latest
    if: github.event.action == 'opened'
    needs: [auto-assign, auto-label]
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            // Give auto-labeling a moment to complete
            await new Promise(r => setTimeout(r, 5000));

            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });

            const warnings = [];

            if (!pr.milestone) {
              warnings.push('- **Milestone**: not set — assign a milestone for release tracking');
            }
            if (pr.labels.length === 0) {
              warnings.push('- **Labels**: none applied — labels should be auto-applied based on changed files');
            }
            if (pr.assignees.length === 0) {
              warnings.push('- **Assignee**: not set');
            }

            if (warnings.length > 0) {
              const message = [
                '## PR Metadata Reminder',
                '',
                'The following metadata is missing:',
                '',
                ...warnings,
                '',
                'Please update before merging.',
              ].join('\n');

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: message,
              });
            }
