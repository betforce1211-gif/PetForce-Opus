name: Documentation Gardener

on:
  schedule:
    # Thursday night 10pm ET (3am UTC Friday) — findings available for Friday review
    - cron: '0 3 * * 5'
  workflow_dispatch:

jobs:
  gardener:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history needed for git log freshness checks

      - name: Run doc-gardener
        id: gardener
        run: |
          output=""

          # Check for stale docs (>90 days without a commit)
          echo "## Stale Documents" >> gardener-report.md
          stale_count=0
          find docs/ -name '*.md' | while read f; do
            last_commit=$(git log --follow -1 --format=%ct -- "$f" 2>/dev/null || echo 0)
            now=$(date +%s)
            days_ago=$(( (now - last_commit) / 86400 ))
            if [ "$days_ago" -gt 90 ]; then
              echo "- **$f** — $days_ago days since last change" >> gardener-report.md
              stale_count=$((stale_count + 1))
            fi
          done

          # Check for broken links
          echo "" >> gardener-report.md
          echo "## Broken Links" >> gardener-report.md
          npx markdown-link-check --config .markdown-link-check.json \
            $(find docs/ -name '*.md') 2>&1 | grep -E '^\s*\[✖\]' >> gardener-report.md || echo "No broken links found." >> gardener-report.md

          # Budget violations
          echo "" >> gardener-report.md
          echo "## Budget Violations (>500 lines)" >> gardener-report.md
          find docs/ -name '*.md' -not -path 'docs/generated/*' | while read f; do
            lines=$(wc -l < "$f")
            if [ "$lines" -gt 500 ]; then
              echo "- **$f** — $lines lines" >> gardener-report.md
            fi
          done

          echo "report_exists=true" >> $GITHUB_OUTPUT

      - name: Create issue if findings
        if: steps.gardener.outputs.report_exists == 'true'
        run: |
          body=$(cat gardener-report.md)
          if echo "$body" | grep -qE '^\- \*\*'; then
            gh issue create \
              --title "Doc gardener: findings $(date +%Y-%m-%d)" \
              --body "$body" \
              --label "docs,maintenance"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
