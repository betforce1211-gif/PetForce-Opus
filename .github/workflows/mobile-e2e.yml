name: Mobile E2E Tests (Maestro)

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "tests/mobile/**"
      - "packages/ui/**"
      - "packages/core/**"
  pull_request:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "tests/mobile/**"
      - "packages/ui/**"
      - "packages/core/**"
  schedule:
    - cron: "0 6 * * 1" # Weekly on Monday at 06:00 UTC
  workflow_dispatch:

concurrency:
  group: mobile-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  maestro-ios:
    name: Maestro E2E (iOS Simulator)
    runs-on: macos-14
    timeout-minutes: 45
    if: >
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && (
        contains(github.event.pull_request.labels.*.name, 'run-mobile-e2e') ||
        contains(github.event.pull_request.labels.*.name, 'mobile')
      ))
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: petforce_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/petforce_test
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
      CLERK_JWT_KEY: ${{ secrets.CLERK_JWT_KEY }}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_API_URL: http://127.0.0.1:3001
      TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
      TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
      CLERK_TEST_CODE: "424242"
      EXPO_NO_TELEMETRY: 1
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Build all packages
        run: pnpm build

      - name: Run database migrations
        run: pnpm --filter=@petforce/db db:migrate

      - name: Start API server
        run: |
          cd apps/api
          node dist/index.js > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/health > /dev/null 2>&1; then
              echo "API ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -f http://localhost:3001/health || { echo "API failed to start:"; cat /tmp/api.log; exit 1; }

      - name: Build Expo app for iOS simulator
        working-directory: apps/mobile
        run: |
          npx expo prebuild --platform ios --clean
          npx expo run:ios --no-install --configuration Release

      - name: Boot iOS Simulator
        run: |
          DEVICE=$(xcrun simctl list devices available | grep "iPhone 16" | head -1 | sed 's/.*(\(.*\)).*/\1/')
          xcrun simctl boot "$DEVICE" || true
          echo "SIMULATOR_UDID=$DEVICE" >> $GITHUB_ENV

      - name: Install app on simulator
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -path "*Release*" | head -1)
          xcrun simctl install booted "$APP_PATH"

      - name: Run Maestro smoke tests
        run: |
          cd tests/mobile
          maestro test --tags smoke flows/ 2>&1 | tee /tmp/maestro-smoke.log

      - name: Run full E2E suite
        if: github.event_name != 'push' || github.ref == 'refs/heads/main'
        env:
          TEST_EMAIL: ${{ secrets.QA_TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.QA_TEST_PASSWORD }}
          TEST_HOUSEHOLD: "CI Test Household"
          TEST_PET_NAME: "CI Test Dog"
          API_URL: ${{ secrets.API_URL || 'http://localhost:3100' }}
        run: |
          cd tests/mobile
          maestro test flows/ 2>&1 | tee /tmp/maestro-full.log

      - name: Upload Maestro results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-screenshots
          path: |
            ~/.maestro/tests/
            /tmp/maestro-*.log
            /tmp/api.log
          retention-days: 14
          if-no-files-found: ignore

  maestro-android:
    name: Maestro E2E (Android Emulator)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      EXPO_NO_TELEMETRY: 1
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Build Expo app for Android
        working-directory: apps/mobile
        run: |
          npx expo prebuild --platform android --clean
          cd android && ./gradlew assembleRelease

      - name: Run Android E2E tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          script: |
            adb install apps/mobile/android/app/build/outputs/apk/release/app-release.apk
            maestro test --tags smoke tests/mobile/

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-screenshots-android
          path: ~/.maestro/tests/
          retention-days: 14
